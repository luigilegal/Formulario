<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <link rel="icon" type="image/svg" href="images/forms.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!--
    PROJETO FEITO POR luigilegal
    LINK DO CRIADOR: https://github.com/luigilegal
    
    FEITO EM 19/06/2026
    -->
    <div id="form">
        <header>
            <div id="box_header">
                <h1 id="Wel">Seja bem vindo</h1></h1>
            </div>
        </header>
        <div id="form1">
            
                <div id="userName" class="caixa">
                    <label for="nome">Nome de Usuario: </label> <br>
                    <input id="nome" class="formbt"><br>
                    <h4 id="warningName" class="Warning"></h4>
                </div>

                <div id="EmailC" class="caixa">
                    <label for="email">Email: </label>
                    <input type="email" id="email" class="formbt">
                    <h4 id="warningEmail" class="Warning"></h4>
                </div>

                <div id="SenhaC" class="caixa">
                    <label for="senha">Senha:</label>
                    <input type="password" id="senha" class="formbt"><input type="checkbox" id="visi">
                    <h4 id="warningSenha" class="Warning"></h4>
                </div>

                <div id="idade" class="caixa">
                    <label for="data">Idade: </label>
                    <input type="date" id="data" class="formbt">
                    <h4 id="warningIdade" class="Warning"></h4>
                </div>

                <div id="TeleC" class="caixa">
                    <label for="tele">Telefone:</label>
                    <input id="tele" class="formbt">
                    <h4 id="warningTelefone" class="Warning"></h4>
                </div>

                <div id="CPFc" class="caixa">
                    <label for="cpf">CPF:</label>
                    <input type="number" id="cpf" class="formbt">
                    <h4 id="warningCpf" class="Warning"></h4>
                </div>

                <div id="PaisC" class="caixa">
                    <label for="pais">Pais:</label>
                    <input id="pais" class="formbt">
                    <h4 id="warningPais" class="Warning"></h4>
                </div>

                <div id="ESTc" class="caixa">
                    <label for="est">Estado:</label>
                    <input id="est" class="formbt">
                    <h4 id="warningEstado" class="Warning"></h4>
                </div>

                <div id="CityC" class="caixa">
                    <label for="city">Cidade:</label>
                    <input id="city" class="formbt">
                    <h4 id="warningCidade" class="Warning"></h4>
                </div>

                <div id="BairroC" class="caixa">
                    <label for="bairro">Bairro:</label>
                    <input id="bairro" class="formbt">
                    <h4 id="warningBairro" class="Warning"></h4>
                </div>

                <div id="numEc" class="caixa">
                    <label for="numE">N° de endereço:</label>
                    <input type="number" id="numE" class="formbt">
                    <h4 id="warningNumero" class="Warning"></h4>
                </div>

                <div id="CEPc" class="caixa">
                    <label for="cep">CEP:</label>
                    <input id="cep" min="0" class="formbt">
                    <h4 id="warningCEP" class="Warning"></h4>
                </div>
            
                <span id="checkC">
                    <input type="checkbox" id="check">
                    <label for="check" id="checkText">Aceito os termos de uso </label><a id="terms" href="terms.html" target="_blank">Termos de uso.</a><br>
                </span>
                
                <div id="submitC">
                    <button id="submit">Enviar</button>
                </div>
            </div>
        
        <div>
            <p class="warn">Atenção: Esse projeto não coleta dados sensíveis.</p>
            <p class="warn">ele apenas simula um formulário</p>
        </div>
        
        <p class="warn">Portanto, sinta-se a vontade para testar o formulário</p>
        <p class="warn">Link do projeto: <a href="https://github.com/luigilegal" target="_blank">Formulário</a></p>
    </div>
    <hr>
    <footer>
        <h1 id="dsnome">Desenvolvido por Luigilegal</h1>
        <h2>Esse projeto é um teste de formulário</h2>
        
    </footer>
    <script src="index.js"></script>
</body>
</html>
